<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wonder Boy in Monster Land</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: #ccc;
    }

    #header {
      width: 100%;
      max-width: 760px;
      padding: 8px 16px 4px;
      text-align: center;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      font-weight: bold;
      color: #f4c430;
      letter-spacing: 0.5px;
    }

    #game-wrapper {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 760px;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
    }

    #keymap {
      width: 100%;
      max-width: 760px;
      padding: 6px 16px;
      font-size: 12px;
      color: #888;
      line-height: 1.7;
      flex-shrink: 0;
    }
    #keymap strong { color: #aaa; }

    @media (max-width: 640px) {
      #keymap { display: none; }
      #header h1 { font-size: 12px; }
      #header { padding: 5px 12px 3px; }
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>Wonder Boy in Monster Land</h1>
  </div>

  <div id="game-wrapper">
    <div id="game"></div>
  </div>

  <div id="keymap">
    <strong>PC 키보드:</strong>
    방향키 이동 &nbsp;|&nbsp;
    <strong>Z</strong> 점프 &nbsp;|&nbsp;
    <strong>X</strong> 공격 &nbsp;|&nbsp;
    <strong>5</strong> 코인 투입 &nbsp;|&nbsp;
    <strong>1</strong> 1P 스타트 &nbsp;|&nbsp;
    <strong>Enter</strong> 선택/확인
    &nbsp;&nbsp;—&nbsp;&nbsp;
    우측 하단 메뉴(≡)에서 키 재설정 가능
  </div>

  <script>
    EJS_player        = '#game';
    EJS_core          = 'fbneo';
    EJS_gameUrl       = './wbmlb.zip';
    EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
    EJS_defaultOptions = {
      'save-state-slot': 1,
      'rewind-enabled':  false,
      'fbneo-frameskip-type': 'auto',
      'fbneo-frameskip-threshold': '33',
    };
    EJS_mobileOptimized = true;
    EJS_aspectRatio = '4/3';
  </script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
